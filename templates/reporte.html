<!DOCTYPE html>
<html>
<head>
    <title>Reporte Médico</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card" style="width: 95%; max-width: 1000px;">

        <h2>📊 Reporte Clínico</h2>

        <table class="tabla-reporte">

            <thead>
                <tr>
                    <th>DNI</th>
                    <th>Fecha</th>
                    <th>INR</th>
                    <th>Dosis Semanal</th>
                </tr>
            </thead>

            <tbody>
                {% for r in registros %}
                <tr>

                    <td>{{ r.dni }}</td>
                    <td>{{ r.fecha }}</td>

                    <!-- 🔥 COLOR SEGÚN INR -->
                    <td class="
                        {% if r.inr < 2 %}inr-bajo
                        {% elif r.inr > 3 %}inr-alto
                        {% else %}inr-normal
                        {% endif %}
                    ">
                        {{ r.inr }}
                    </td>

                    <!-- DOSIS BONITA -->
                    <td>
                        <div class="dosis-mini">

                            {% for d,v in r.dosis.items() %}
                                <span>{{ d[:3] }}: {{ v }}</span>
                            {% endfor %}

                        </div>
                    </td>

                </tr>
                {% endfor %}
            </tbody>

        </table>

        <a href="/logout" class="logout-link">Cerrar sesión</a>

    </div>

</div>

</body>
</html>
