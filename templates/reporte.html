<!DOCTYPE html>
<html>
<head>
    <title>Reporte Médico</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- 📊 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="login-body">

<div class="login-container">

<div class="login-card" style="width: 95%; max-width: 1100px;">

    <h2>📊 Reporte Clínico</h2>

    <!-- 🔎 BUSCADOR -->
    <input type="text" id="buscador"
           placeholder="Buscar por DNI o nombre..."
           style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;">

    <!-- 📊 KPI -->
    <div style="margin-bottom:15px;">
        <b>Total registros:</b> {{ registros|length }}
    </div>

    <!-- 📈 GRÁFICO -->
    <canvas id="graficoINR" style="margin-bottom:20px;"></canvas>

    <!-- TABLA -->
    <table class="tabla-reporte" id="tabla">

        <thead>
            <tr>
                <th>DNI</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>INR</th>
                <th>Dosis Semanal</th>
            </tr>
        </thead>

        <tbody>
            {% for r in registros %}
            <tr>

                <td>{{ r.dni }}</td>
                <td>{{ r.nombre if r.nombre else "—" }}</td>
                <td>{{ r.fecha }}</td>

                <!-- COLOR INR -->
                <td class="
                    {% if r.inr < 2 %}inr-bajo
                    {% elif r.inr > 3 %}inr-alto
                    {% else %}inr-normal
                    {% endif %}
                ">
                    {{ r.inr }}
                </td>

                <!-- DOSIS -->
                <td>
                    <div class="dosis-mini">
                        {% for d,v in r.dosis.items() %}
                            <span class="badge">{{ d[:3] }}: {{ v }}</span>
                        {% endfor %}
                    </div>
                </td>

            </tr>
            {% endfor %}
        </tbody>

    </table>

    <a href="/logout" class="logout-link">Cerrar sesión</a>

</div>
</div>

<!-- 🔎 BUSCADOR -->
<script>
document.getElementById("buscador").addEventListener("keyup", function() {
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("#tabla tbody tr");

    filas.forEach(f => {
        let texto = f.innerText.toLowerCase();
        f.style.display = texto.includes(filtro) ? "" : "none";
    });
});
</script>

<!-- 📈 GRÁFICO (FIX SIN ERRORES) -->
<script>
const datos = {
    labels: {{ registros | map(attribute='fecha') | list | tojson | safe }},
    datasets: [
        {
            label: 'INR',
            data: {{ registros | map(attribute='inr') | list | tojson | safe }},
            borderWidth: 2,
            tension: 0.3
        }
    ]
};

new Chart(document.getElementById('graficoINR'), {
    type: 'line',
    data: datos
});
</script>

</body>
</html>
