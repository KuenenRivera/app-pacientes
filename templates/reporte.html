<!DOCTYPE html>
<html>
<head>
    <title>Reporte Médico</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body class="login-body">

<div class="login-container">

<div class="login-card" style="width: 95%; max-width: 1200px;">

    <h2>📊 Reporte Clínico</h2>

    <!-- 🔎 BUSCADOR -->
    <input type="text" id="buscador"
        placeholder="Buscar por DNI o nombre..."
        style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ccc;">

    <!-- 📊 KPI -->
    <div style="display:flex; gap:15px; margin-bottom:20px; flex-wrap:wrap;">
        <div class="kpi-box">
            <h3>{{ registros|length }}</h3>
            <span>Registros</span>
        </div>
    </div>

    <!-- 📈 GRÁFICO (CONTROLADO) -->
    <div style="height:300px; margin-bottom:20px;">
        <canvas id="graficoINR"></canvas>
    </div>

    <!-- TABLA -->
    <table class="tabla-reporte" id="tabla">

        <thead>
            <tr>
                <th>DNI</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>INR</th>
                <th>Dosis</th>
            </tr>
        </thead>

        <tbody>
            {% for r in registros %}
            <tr>

                <td>{{ r.dni }}</td>
                <td>{{ r.nombre if r.nombre else "—" }}</td>
                <td>{{ r.fecha }}</td>

                <td class="inr-{{ 'bajo' if r.inr|float < 2 else 'alto' if r.inr|float > 3 else 'normal' }}">
                    {{ r.inr }}
                </td>

                <td>
                    <div class="dosis-mini">
                        {% for d,v in r.dosis.items() %}
                            <span class="badge">{{ d[:3] }}: {{ v }}</span>
                        {% endfor %}
                    </div>
                </td>

            </tr>
            {% endfor %}
        </tbody>

    </table>

    <a href="/logout" class="logout-link">Cerrar sesión</a>

</div>
</div>

<!-- 🔎 BUSCADOR (FIX REAL) -->
<script>
let graficoINR = null; // Variable global para almacenar el gráfico

document.getElementById("buscador").addEventListener("keyup", function() {
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("#tabla tbody tr");

    // Arrays para almacenar los datos filtrados
    let registrosFiltrados = [];
    let labelsFiltrados = [];
    let dataINR = [];

    filas.forEach(fila => {
        let columnas = fila.querySelectorAll("td");

        let dni = columnas[0].innerText.toLowerCase();
        let nombre = columnas[1].innerText.toLowerCase();

        // Filtrar filas según el texto introducido en el input
        if (dni.includes(filtro) || nombre.includes(filtro)) {
            fila.style.display = "";
            // Almacenar los registros filtrados
            registrosFiltrados.push({
                dni: columnas[0].innerText,
                nombre: columnas[1].innerText,
                fecha: columnas[2].innerText,
                inr: columnas[3].innerText
            });
            labelsFiltrados.push(columnas[2].innerText); // Fecha
            dataINR.push(columnas[3].innerText); // INR
        } else {
            fila.style.display = "none";
        }
    });

    // Crear los datos para el gráfico
    const datos = {
        labels: labelsFiltrados,
        datasets: [{
            label: 'INR',
            data: dataINR,
            borderWidth: 2,
            tension: 0.3
        }]
    };

    // Crear o actualizar el gráfico
    if (graficoINR) {
        // Si el gráfico ya existe, actualizamos los datos
        graficoINR.data = datos;
        graficoINR.update();
    } else {
        // Si no existe, lo creamos por primera vez
        graficoINR = new Chart(document.getElementById('graficoINR'), {
            type: 'line',
            data: datos,
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }
});
</script>

<!-- 📈 GRÁFICO (ARREGLADO) -->
<script>
const labels = {{ registros | map(attribute='fecha') | list | tojson }};
const dataINR = {{ registros | map(attribute='inr') | list | tojson }};

// Inicializa el gráfico por primera vez
graficoINR = new Chart(document.getElementById('graficoINR'), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'INR',
            data: dataINR,
            borderWidth: 2,
            tension: 0.3
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

</body>
</html>
