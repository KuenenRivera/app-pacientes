<!DOCTYPE html>
<html>
<head>
    <title>Edición</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h2>🧪 Control de Paciente</h2>

        <form method="POST">

            <!-- CAMPOS -->
            <div class="input-group">
                <label>Fecha</label>
                <input type="date" name="fecha" required>
            </div>

            <div class="input-group">
                <label>INR</label>
                <input type="number" step="0.1" name="inr" placeholder="Ej: 2.5" required>
            </div>

            <h3 class="subtitulo">Dosis semanal</h3>

            <!-- 🔥 DOSIS CON IMÁGENES -->
            <div class="dosis-grid">

                {% for d in ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"] %}
                <div class="dia-card">

                    <p class="dia-nombre">{{ d.capitalize() }}</p>

                    <div class="pastillas-group">

                        <label>
                            <input type="radio" name="{{d}}" value="0.5" required>
                            <img src="{{ url_for('static', filename='img/media.jpeg') }}">
                            <span>0.5</span>
                        </label>

                        <label>
                            <input type="radio" name="{{d}}" value="1">
                            <img src="{{ url_for('static', filename='img/uno.jpeg') }}">
                            <span>1</span>
                        </label>

                        <label>
                            <input type="radio" name="{{d}}" value="1.5">
                            <img src="{{ url_for('static', filename='img/uno_medio.jpeg') }}">
                            <span>1.5</span>
                        </label>

                        <label>
                            <input type="radio" name="{{d}}" value="2">
                            <img src="{{ url_for('static', filename='img/dos.jpeg') }}">
                            <span>2</span>
                        </label>

                    </div>

                </div>
                {% endfor %}

            </div>

            <button type="submit">Guardar</button>

        </form>

    </div>

</div>

</body>
</html>
