<!DOCTYPE html>
<html>
<head>
    <title>Edición</title>
</head>
<body>

<h2>Edición</h2>

<form method="POST">

<!-- 🔥 CAMPOS OBLIGATORIOS -->
Fecha: 
<input type="date" name="fecha" required><br><br>

INR: 
<input type="number" step="0.1" name="inr" required><br><br>

<h3>Dosis semanal</h3>

<!-- 🔥 DOSIS OBLIGATORIA POR CADA DÍA -->
{% for d in ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"] %}
<p>{{d}}:

<input type="radio" name="{{d}}" value="0.5" required>0.5
<input type="radio" name="{{d}}" value="1">1
<input type="radio" name="{{d}}" value="1.5">1.5
<input type="radio" name="{{d}}" value="2">2

</p>
{% endfor %}

<br>
<button type="submit">Guardar</button>

</form>

</body>
</html>
