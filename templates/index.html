<!DOCTYPE html>
<html>
<head>
    <title>Ingreso DNI</title>

    <!-- RESPONSIVE (IMPORTANTE PARA CELULAR) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="login-body">

<div class="login-container">

    <div class="login-card">

        <h2>🆔 Ingreso de Paciente</h2>

        <!-- 🔥 FORM CON VALIDACIÓN -->
        <form method="POST" onsubmit="return validarSubmit()">

            <!-- TIPO DOCUMENTO -->
            <div class="input-group">
                <select name="tipo_doc" id="tipo_doc" required>
                    <option value="">Tipo de documento</option>
                    <option value="dni">DNI (8 dígitos)</option>
                    <option value="ce">Carné de extranjería (9)</option>
                    <option value="pasaporte">Pasaporte (6-12)</option>
                </select>
            </div>

            <!-- NUMERO -->
            <div class="input-group">
                <input type="text" id="dni" name="dni" placeholder="Número de documento" required>
            </div>

            <!-- 🔥 MENSAJE ERROR -->
            <div id="error-msg" class="error-msg"></div>

            <button>Continuar</button>

        </form>

        <a href="/logout" class="logout-link">Cerrar sesión</a>

    </div>

</div>

<!-- ========================= -->
<!-- 🔥 VALIDACIÓN PRO -->
<!-- ========================= -->
<script>

const tipo = document.getElementById("tipo_doc");
const dni = document.getElementById("dni");
const error = document.getElementById("error-msg");

/* VALIDACIÓN EN TIEMPO REAL */
dni.addEventListener("input", validar);
tipo.addEventListener("change", () => {
    dni.value = "";
    limpiar();
});

/* LIMPIAR ERROR */
function limpiar() {
    dni.classList.remove("input-error");
    error.innerText = "";
}

/* VALIDAR MIENTRAS ESCRIBE */
function validar() {
    const valor = dni.value;
    limpiar();

    if (!tipo.value) return;

    if (tipo.value === "dni") {
        if (!/^\d{0,8}$/.test(valor)) {
            dni.classList.add("input-error");
        }
    }

    if (tipo.value === "ce") {
        if (!/^\d{0,9}$/.test(valor)) {
            dni.classList.add("input-error");
        }
    }

    if (tipo.value === "pasaporte") {
        if (valor.length > 12) {
            dni.classList.add("input-error");
        }
    }
}

/* VALIDAR AL ENVIAR */
function validarSubmit() {

    const valor = dni.value;
    limpiar();

    if (!tipo.value) {
        error.innerText = "Selecciona un tipo de documento";
        return false;
    }

    if (tipo.value === "dni" && !/^\d{8}$/.test(valor)) {
        error.innerText = "El DNI debe tener exactamente 8 dígitos";
        dni.classList.add("input-error");
        return false;
    }

    if (tipo.value === "ce" && !/^\d{9}$/.test(valor)) {
        error.innerText = "El CE debe tener 9 dígitos";
        dni.classList.add("input-error");
        return false;
    }

    if (tipo.value === "pasaporte" && (valor.length < 6 || valor.length > 12)) {
        error.innerText = "El pasaporte debe tener entre 6 y 12 caracteres";
        dni.classList.add("input-error");
        return false;
    }

    return true; // ✅ ENVÍA AL BACKEND
}

</script>

</body>
</html>
